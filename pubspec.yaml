name: meal_planner
description: AI Meal Planner & Calorie Scanner

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  image_picker: ^1.0.7
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  http: ^1.2.0
  uuid: ^4.3.3
  smooth_page_indicator: ^1.1.0
  crypto: ^3.0.3
  tflite_flutter: ^0.11.0
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/model_unquant.tflite
    - assets/labels.txt